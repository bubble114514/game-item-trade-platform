server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://192.168.201.100:3306/game_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: 192.168.201.100
      port: 6379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.201.100:8848
        namespace: 

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  is-concurrent: true
  alone-redis:
    host: 192.168.201.100
    port: 6379
    database: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
