# 基础设施：MySQL / Redis / Nacos / RocketMQ / Elasticsearch
# 使用：docker compose -f deploy/docker-compose-infra.yml up -d
# 业务服务在本地用 mvn spring-boot:run 或打包后 java -jar 启动

services:
  mysql:
    image: mysql:8.0
    container_name: gitp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: gitp-redis
    ports:
      - "6379:6379"

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: gitp-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: gitp-rmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: gitp-rmq-broker
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876 autoCreateTopicEnable=true
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"

  elasticsearch:
    image: elasticsearch:8.11.3
    container_name: gitp-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  mysql_data:
  es_data:
