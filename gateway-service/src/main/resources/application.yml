server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: 192.168.201.100
      port: 6379
      database: 0
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.201.100:8848
        namespace: 
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: user-route
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: item-route
          uri: lb://item-service
          predicates:
            - Path=/api/item/**
        - id: trade-route
          uri: lb://trade-service
          predicates:
            - Path=/api/trade/**
        - id: search-route
          uri: lb://search-service
          predicates:
            - Path=/api/search/**
        - id: payment-route
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**
        - id: message-route
          uri: lb://message-service
          predicates:
            - Path=/api/message/**

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  is-concurrent: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
