server:
  port: 8082

spring:
  application:
    name: item-service
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://192.168.201.100:3306/game_item?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: 192.168.201.100
      port: 6379
      database: 1
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.201.100:8848
        namespace: 
    sentinel:
      transport:
        dashboard: 192.168.201.100:8080
      log:
        dir: logs/sentinel

management:
  endpoints:
    web:
      exposure:
        include: health,info
