server:
  port: 8084

spring:
  application:
    name: search-service
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://127.0.0.1:9200}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
